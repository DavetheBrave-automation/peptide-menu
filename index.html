<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peptides - Heather Necaise</title>
  <meta http-equiv="refresh" content="0;url=peptide_price_sheet.pdf">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #4a90b8;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    a {
      display: block;
      padding: 0.75rem 1.25rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    a:hover { opacity: 0.85; }
    .primary {
      background: #4a90b8;
      color: #fff;
    }
    .secondary {
      background: #1e1e1e;
      color: #aaa;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Peptides — Heather Necaise</h1>
    <p>Loading price sheet&hellip;</p>
    <div class="links">
      <a class="primary" href="peptide_price_sheet.pdf">Price Sheet (with contact)</a>
      <a class="secondary" href="peptide_price_sheet_no_contact.pdf">Price Sheet (no contact)</a>
      <a class="secondary" href="peptide_price_sheet_2page.pdf">2-Page Sheet (with contact)</a>
      <a class="secondary" href="peptide_price_sheet_2page_no_contact.pdf">2-Page Sheet (no contact)</a>
    </div>
  </div>
</body>
</html>
